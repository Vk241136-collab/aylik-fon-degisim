services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fund_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fund_analyzer
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend/app:/app/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - db

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fund_analyzer
      KAP_SYNC_ENABLED: "false"
      KAP_POLL_INTERVAL_MINUTES: "30"
    volumes:
      - ./backend/app:/app/app
      - ./storage:/app/storage
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
